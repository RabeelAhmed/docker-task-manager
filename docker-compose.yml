version: "3.8"

services:
  mongo:
    image: mongo
    container_name: mongo_container
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build: ./server
    container_name: backend_container
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/taskdb

  client:
    build: ./client
    container_name: frontend_container
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  mongo-data:
