version: "3.8"

services:
  mongo:
    image: mongo
    container_name: mongo_container
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

  server:
    build: ./server
    container_name: backend_container
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/taskdb
    networks:
      - app-network

  client:
    build: ./client
    container_name: frontend_container
    depends_on:
      - server
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx_container
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - client
      - server
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:
